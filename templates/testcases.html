<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Rearranger | QA Suite</title>
    <style>
        :root { --primary: #4a90e2; --success: #38a169; --bg: #f7fafc; --text: #2d3748; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .btn { background: var(--success); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        input[type="file"] { margin-bottom: 20px; width: 100%; padding: 10px; border: 1px dashed #cbd5e0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📄 CSV Rearranger</h2>
        <p>Upload BrowserStack Export to clean columns for the client.</p>
        <form action="/testcases" method="POST" enctype="multipart/form-data">
            <input type="file" name="csv_file" accept=".csv, .xlsx" required>
            <button type="submit" class="btn">Rearrange and Download</button>
        </form>
        <p style="margin-top: 20px; text-align: center;"><a href="/" style="color: var(--primary);">← Back to UI Verifier</a></p>
    </div>
</body>
</html>
