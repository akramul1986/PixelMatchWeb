<!DOCTYPE html>
<html>
<head>
    <title>Login | Portonics UI Verifier</title>
    <style>
        body { font-family: sans-serif; background: #f7fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔐 Team Login</h2>
        <p>Use your @portonics.com email to access.</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="email" name="email" placeholder="email@portonics.com" required>
            <input type="password" name="password" placeholder="Team Password" required>
            <button type="submit">Access Verifier</button>
        </form>
    </div>
</body>
</html>
